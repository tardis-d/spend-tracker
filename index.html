<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spend</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#F5F4F0; --surface:#FFFFFF; --border:rgba(0,0,0,0.08); --border-md:rgba(0,0,0,0.14);
  --ink:#1C1C1A; --ink2:#6B6B66; --ink3:#ABABAB;
  --green:#1A7A4A; --green-bg:#EBF5EE; --green-mid:#52A878;
  --red:#C0392B; --sans:'DM Sans',system-ui,sans-serif; --mono:'DM Mono',monospace;
  --r:14px; --rs:10px;
}
body { font-family:var(--sans); background:var(--bg); color:var(--ink); min-height:100vh; max-width:430px; margin:0 auto; -webkit-font-smoothing:antialiased; }

.header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 18px 0; position:sticky; top:0; z-index:50; }
.hrow { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:14px; }
.logo { font-size:20px; font-weight:500; letter-spacing:-0.6px; }
.logo em { color:var(--green); font-style:normal; }
.hmonth { font-size:12px; font-family:var(--mono); color:var(--ink3); }
.tabs { display:flex; }
.tab { flex:1; background:none; border:none; font-family:var(--sans); font-size:13px; font-weight:400; color:var(--ink3); padding:9px 4px 12px; cursor:pointer; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; }
.tab.active { color:var(--green); border-bottom-color:var(--green); font-weight:500; }

.view { display:none; padding:18px; }
.view.active { display:block; }

/* LOG */
.amount-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:22px 20px 16px; margin-bottom:14px; text-align:center; }
.amount-num { font-family:var(--mono); font-size:56px; font-weight:500; letter-spacing:-3px; line-height:1; color:var(--ink3); min-height:64px; display:flex; align-items:center; justify-content:center; transition:color .15s; }
.amount-num.lit { color:var(--green); }
.amount-sub { font-size:11px; color:var(--ink3); margin-top:7px; letter-spacing:.2px; }

.numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:14px; }
.nk { background:var(--surface); border:1px solid var(--border); border-radius:var(--rs); height:62px; font-size:22px; font-family:var(--mono); font-weight:400; color:var(--ink); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .1s,transform .08s; user-select:none; -webkit-user-select:none; }
.nk:active { background:var(--green-bg); transform:scale(0.96); }
.nk.del { font-size:18px; color:var(--ink2); }
.nk.dot { font-size:30px; line-height:0; padding-bottom:4px; }

.sec-lbl { font-size:10px; font-family:var(--mono); text-transform:uppercase; letter-spacing:1.2px; color:var(--ink3); margin-bottom:9px; }
.cat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:18px; }
.ck { background:var(--surface); border:1px solid var(--border); border-radius:var(--rs); padding:10px 5px; font-family:var(--sans); font-size:11.5px; font-weight:400; color:var(--ink2); cursor:pointer; text-align:center; line-height:1.3; min-height:48px; display:flex; align-items:center; justify-content:center; transition:all .12s; user-select:none; -webkit-user-select:none; }
.ck:active { background:var(--green-bg); color:var(--green); }
.ck.sel { background:var(--green-bg); border-color:var(--green); color:var(--green); font-weight:500; }

.save-btn { width:100%; background:var(--green); color:#fff; border:none; border-radius:var(--r); height:54px; font-family:var(--sans); font-size:15px; font-weight:500; cursor:pointer; transition:opacity .15s,transform .08s; }
.save-btn:disabled { opacity:.28; cursor:default; }
.save-btn:active:not(:disabled) { transform:scale(0.98); }

/* HISTORY + SUMMARY shared */
.mnav { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:10px 6px; margin-bottom:16px; }
.mnav-btn { background:none; border:none; width:38px; height:38px; border-radius:8px; font-size:20px; color:var(--green); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.mnav-btn:active { background:var(--green-bg); }
.mnav-lbl { font-family:var(--mono); font-size:14px; color:var(--ink); }

.day-block { margin-bottom:18px; }
.day-lbl { font-size:10px; font-family:var(--mono); text-transform:uppercase; letter-spacing:1px; color:var(--ink3); margin-bottom:6px; padding-left:2px; }
.entry { background:var(--surface); border:1px solid var(--border); border-radius:var(--rs); padding:12px 14px; display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.entry-cat { font-size:14px; color:var(--ink); }
.entry-r { display:flex; align-items:center; gap:10px; }
.entry-amt { font-family:var(--mono); font-size:14px; font-weight:500; color:var(--green); }
.entry-x { background:none; border:none; color:var(--ink3); font-size:14px; width:28px; height:28px; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .1s,color .1s; }
.entry-x:active { background:#FDE8E6; color:var(--red); }

.total-card { background:var(--green); border-radius:var(--r); padding:20px 22px; margin-bottom:14px; display:flex; align-items:flex-end; justify-content:space-between; }
.total-lbl { font-size:11px; color:rgba(255,255,255,.65); letter-spacing:.3px; margin-bottom:4px; }
.total-amt { font-family:var(--mono); font-size:36px; font-weight:500; color:#fff; letter-spacing:-1.5px; line-height:1; }
.total-meta { font-family:var(--mono); font-size:11px; color:rgba(255,255,255,.6); text-align:right; line-height:1.8; }

.sum-row { background:var(--surface); border:1px solid var(--border); border-radius:var(--rs); padding:11px 14px; margin-bottom:5px; }
.sum-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; }
.sum-cat { font-size:13px; color:var(--ink); }
.sum-amt { font-family:var(--mono); font-size:13px; font-weight:500; color:var(--green); }
.bar-t { height:3px; background:var(--border); border-radius:2px; }
.bar-f { height:3px; background:var(--green-mid); border-radius:2px; transition:width .5s ease; }

.export-btn { width:100%; background:var(--surface); color:var(--green); border:1px solid var(--border-md); border-radius:var(--r); height:50px; font-family:var(--sans); font-size:14px; font-weight:500; cursor:pointer; margin-top:14px; transition:background .12s; }
.export-btn:active { background:var(--green-bg); }

.empty { text-align:center; color:var(--ink3); padding:60px 20px; font-size:14px; line-height:1.7; }

.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(14px); background:var(--ink); color:#fff; padding:10px 22px; border-radius:30px; font-size:13px; opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="hrow">
    <div class="logo">spend<em>.</em></div>
    <div class="hmonth" id="hdrM"></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="goto('log',this)">Log</button>
    <button class="tab" onclick="goto('history',this)">History</button>
    <button class="tab" onclick="goto('summary',this)">Summary</button>
  </div>
</div>

<div class="view active" id="view-log">
  <div class="amount-card">
    <div class="amount-num" id="amtD">£0</div>
    <div class="amount-sub">enter amount · tap a category to save</div>
  </div>
  <div class="numpad">
    <button class="nk" onclick="nk('1')">1</button>
    <button class="nk" onclick="nk('2')">2</button>
    <button class="nk" onclick="nk('3')">3</button>
    <button class="nk" onclick="nk('4')">4</button>
    <button class="nk" onclick="nk('5')">5</button>
    <button class="nk" onclick="nk('6')">6</button>
    <button class="nk" onclick="nk('7')">7</button>
    <button class="nk" onclick="nk('8')">8</button>
    <button class="nk" onclick="nk('9')">9</button>
    <button class="nk dot" onclick="nk('.')">·</button>
    <button class="nk" onclick="nk('0')">0</button>
    <button class="nk del" onclick="nd()">⌫</button>
  </div>
  <div class="sec-lbl">Category</div>
  <div class="cat-grid" id="catGrid"></div>
  <button class="save-btn" id="saveBtn" disabled onclick="doSave()">Save</button>
</div>

<div class="view" id="view-history">
  <div class="mnav">
    <button class="mnav-btn" onclick="hNav(-1)">‹</button>
    <div class="mnav-lbl" id="hLbl"></div>
    <button class="mnav-btn" onclick="hNav(1)">›</button>
  </div>
  <div id="hContent"></div>
</div>

<div class="view" id="view-summary">
  <div class="mnav">
    <button class="mnav-btn" onclick="sNav(-1)">‹</button>
    <div class="mnav-lbl" id="sLbl"></div>
    <button class="mnav-btn" onclick="sNav(1)">›</button>
  </div>
  <div class="total-card">
    <div><div class="total-lbl">Total spent</div><div class="total-amt" id="sTotal">£0.00</div></div>
    <div class="total-meta" id="sMeta"></div>
  </div>
  <div id="sContent"></div>
  <button class="export-btn" onclick="doExport()">Export CSV</button>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS=["3 Eaton","Acting","Amazon Home","Amazon Me","Amazon Samm","Charity","Cleaner","Clothes Me","Clothes Samm","Eating out","Entertainment","Gardener","Gifts","Haircut","Healthcare","Holidays","Insurance","Ironing","Mells","Parking","Repairs","Snacks","Supermarket","Tesla","Train + Taxi","Webber","Window Cleaner","Working Coffee","Working Food"];
let amt='',sel='',hM=new Date(),sM=new Date();
const db=()=>{try{return JSON.parse(localStorage.getItem('sx3')||'[]')}catch{return[]}};
const save=a=>localStorage.setItem('sx3',JSON.stringify(a));
const fmt=d=>d.toLocaleString('en-GB',{month:'long',year:'numeric'});

function init(){
  document.getElementById('hdrM').textContent=fmt(new Date());
  const g=document.getElementById('catGrid');
  CATS.forEach(c=>{const b=document.createElement('button');b.className='ck';b.textContent=c;b.id='ck'+c;b.onclick=()=>pick(c);g.appendChild(b);});
  setHM(new Date());setSM(new Date());
}

function nk(ch){
  if(ch==='.'&&amt.includes('.'))return;
  if(ch==='.'&&!amt)amt='0';
  if(amt.includes('.')&&amt.split('.')[1].length>=2)return;
  if(amt.replace('.','').length>=7)return;
  if(amt==='0'&&ch!=='.')amt=ch;else amt+=ch;
  upd();
}
function nd(){amt=amt.slice(0,-1);upd();}
function upd(){
  const e=document.getElementById('amtD');
  if(!amt||amt==='0'){e.textContent='£0';e.classList.remove('lit');}
  else{e.textContent='£'+amt;e.classList.add('lit');}
  document.getElementById('saveBtn').disabled=!(parseFloat(amt)>0&&sel);
}
function pick(c){
  document.querySelectorAll('.ck').forEach(b=>b.classList.remove('sel'));
  document.getElementById('ck'+c).classList.add('sel');
  sel=c;
  document.getElementById('saveBtn').disabled=!(parseFloat(amt)>0&&sel);
  if(parseFloat(amt)>0)doSave();
}
function doSave(){
  const v=parseFloat(amt);if(!v||!sel)return;
  const all=db();
  all.push({id:Date.now(),date:new Date().toISOString().slice(0,10),category:sel,amount:Math.round(v*100)/100});
  save(all);
  amt='';sel='';
  const e=document.getElementById('amtD');e.textContent='£0';e.classList.remove('lit');
  document.querySelectorAll('.ck').forEach(b=>b.classList.remove('sel'));
  document.getElementById('saveBtn').disabled=true;
  toast('Saved ✓');
}

function setHM(d){hM=new Date(d.getFullYear(),d.getMonth(),1);renderH();}
function hNav(dir){hM=new Date(hM.getFullYear(),hM.getMonth()+dir,1);renderH();}
function renderH(){
  document.getElementById('hLbl').textContent=fmt(hM);
  const y=hM.getFullYear(),m=hM.getMonth();
  const rows=db().filter(e=>{const d=new Date(e.date);return d.getFullYear()===y&&d.getMonth()===m;});
  const el=document.getElementById('hContent');
  if(!rows.length){el.innerHTML='<div class="empty">No entries this month.</div>';return;}
  const grp={};
  rows.forEach(e=>{(grp[e.date]||(grp[e.date]=[])).push(e);});
  const days=Object.keys(grp).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=days.map(dt=>{
    const d=new Date(dt+'T00:00:00');
    const lbl=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    return`<div class="day-block"><div class="day-lbl">${lbl}</div>${
      grp[dt].map(e=>`<div class="entry"><div class="entry-cat">${e.category}</div><div class="entry-r"><div class="entry-amt">£${e.amount.toFixed(2)}</div><button class="entry-x" onclick="del(${e.id})">✕</button></div></div>`).join('')
    }</div>`;
  }).join('');
}
function del(id){save(db().filter(e=>e.id!==id));renderH();toast('Deleted');}

function setSM(d){sM=new Date(d.getFullYear(),d.getMonth(),1);renderS();}
function sNav(dir){sM=new Date(sM.getFullYear(),sM.getMonth()+dir,1);renderS();}
function renderS(){
  document.getElementById('sLbl').textContent=fmt(sM);
  const y=sM.getFullYear(),m=sM.getMonth();
  const rows=db().filter(e=>{const d=new Date(e.date);return d.getFullYear()===y&&d.getMonth()===m;});
  const tots={};rows.forEach(e=>{tots[e.category]=(tots[e.category]||0)+e.amount;});
  const cats=Object.keys(tots).sort((a,b)=>a.localeCompare(b));
  const grand=cats.reduce((s,c)=>s+tots[c],0);
  const mx=cats.length?Math.max(...cats.map(c=>tots[c])):1;
  document.getElementById('sTotal').textContent='£'+grand.toFixed(2);
  document.getElementById('sMeta').textContent=rows.length+' transaction'+(rows.length===1?'':'s');
  const el=document.getElementById('sContent');
  if(!cats.length){el.innerHTML='<div class="empty">No entries this month.</div>';return;}
  el.innerHTML=cats.map(c=>{
    const pct=Math.round((tots[c]/mx)*100);
    return`<div class="sum-row"><div class="sum-top"><div class="sum-cat">${c}</div><div class="sum-amt">£${tots[c].toFixed(2)}</div></div><div class="bar-t"><div class="bar-f" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

function doExport(){
  const y=sM.getFullYear(),m=sM.getMonth();
  const rows=db().filter(e=>{const d=new Date(e.date);return d.getFullYear()===y&&d.getMonth()===m;});
  const tots={};rows.forEach(e=>{tots[e.category]=(tots[e.category]||0)+e.amount;});
  const cats=Object.keys(tots).sort((a,b)=>a.localeCompare(b));
  const grand=cats.reduce((s,c)=>s+tots[c],0);
  let csv='Category,Amount (GBP)\n';
  cats.forEach(c=>{csv+=`"${c}",${tots[c].toFixed(2)}\n`;});
  csv+=`\nTOTAL,${grand.toFixed(2)}\n`;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`spend-${y}-${String(m+1).padStart(2,'0')}.csv`;
  a.click();
  toast('CSV downloaded');
}

function goto(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='history')renderH();
  if(name==='summary')renderS();
}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}
init();
</script>
</body>
</html>
